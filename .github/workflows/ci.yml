name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]

permissions: read-all

jobs:
  validate-esphome-config:
    name: Validate ESPHome config
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Set up Python"
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: "Install ESPHome"
        run: pip install esphome

      - name: "Create dummy secrets"
        run: |
          cat > secrets.yaml <<'EOF'
          wifi_ssid: "placeholder"
          wifi_password: "placeholder"
          ap_password: "placeholder"
          ota_password: "placeholderpassword"
          encryption_key: "3K8qHTazdGWq6zdx0QU33LWI0LAMGne/Cxl1tDRLta4="
          web_server_username: "placeholder"
          web_server_password: "placeholder"
          EOF

      - name: "Validate emax.yaml"
        run: esphome config emax.yaml
